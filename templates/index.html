<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe — Neural Clash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}" />
</head>
<body>

  <!-- Ambient background particles -->
  <div class="bg-grid"></div>
  <div class="particles" id="particles"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="title-wrap">
        <h1 class="game-title">
          <span class="title-x">X</span>
          <span class="title-dot">·</span>
          <span class="title-sub">NEURAL CLASH</span>
          <span class="title-dot">·</span>
          <span class="title-o">O</span>
        </h1>
        <p class="subtitle">Human vs AI</p>
      </div>
    </header>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-card human-card">
        <div class="score-label">YOU</div>
        <div class="score-value" id="score-human">0</div>
        <div class="score-icon">⚡</div>
      </div>
      <div class="score-card draw-card">
        <div class="score-label">DRAW</div>
        <div class="score-value" id="score-draws">0</div>
        <div class="score-icon">🤝</div>
      </div>
      <div class="score-card ai-card">
        <div class="score-label">AI</div>
        <div class="score-value" id="score-ai">0</div>
        <div class="score-icon">🤖</div>
      </div>
    </div>

    <!-- Turn Indicator -->
    <div class="turn-indicator" id="turn-indicator">
      <div class="turn-inner">
        <span class="turn-dot"></span>
        <span class="turn-text" id="turn-text">Your Turn — Play X</span>
      </div>
    </div>

    <!-- Game Board -->
    <div class="board-wrap">
      <div class="board" id="board">
        <!-- 9 cells generated by JS -->
      </div>
    </div>

    <!-- Restart Button -->
    <button class="restart-btn" id="restart-btn" onclick="resetGame()">
      <span class="btn-icon">↺</span>
      <span>NEW GAME</span>
    </button>

    <!-- Clear Data Button -->
    <button class="clear-btn" id="clear-btn" onclick="clearData()">
      <span class="btn-icon">🗑️</span>
      <span>CLEAR DATA</span>
    </button>

  </div>

  <!-- Winner Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-glow"></div>
      <div class="modal-emoji" id="modal-emoji"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <p class="modal-sub" id="modal-sub"></p>
      <button class="modal-btn" onclick="resetGame()">PLAY AGAIN</button>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas"></canvas>

  <footer>
    <p class="footer-text">Made for pyexpo by <a href="https://ips-community.netlify.app/">IPS TECH TEAM</a></p>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
